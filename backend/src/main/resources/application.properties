spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cabin_data_platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cabin_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

mybatis.configuration.map-underscore-to-camel-case=true

cabin.jwt.issuer=${JWT_ISSUER:cabin-data-platform}
cabin.jwt.secret=${JWT_SECRET:}
cabin.jwt.expires-in-seconds=${JWT_EXPIRES_IN_SECONDS:7200}

cabin.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
cabin.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
cabin.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}

management.endpoints.web.exposure.include=health,info,flyway
